name: Log Repo Traffic

on:
  schedule:
    # Run daily at 06:00 UTC so GitHub's traffic data for the previous day
    # is fully settled before we fetch it.
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual runs for testing

# Temporary: opt into Node.js 24 for JS-based GitHub Actions now (per deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  log-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the updated CSV files back to the repo

    steps:
      # Checkout the repo we're going to commit back into (this repo)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Checkout the traffic logger repo into a subdirectory (Option B1)
      - name: Checkout repo-traffic-logger
        uses: actions/checkout@v4
        with:
          repository: StepFunctionLLC/repo-traffic-logger
          path: traffic-logger

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install traffic logger dependencies
        run: pip install -r traffic-logger/requirements.txt

      # Temporary: debug info (non-secret) to help diagnose failures
      - name: Debug env (non-secret)
        run: |
          echo "TRAFFIC_REPO=${{ github.repository }}"
          python --version
          pip --version

      - name: Log traffic data
        env:
          TRAFFIC_GITHUB_TOKEN: ${{ secrets.TRAFFIC_GITHUB_TOKEN }}
          TRAFFIC_REPO: ${{ github.repository }}
        # Temporary: unbuffered output for better error visibility in Actions logs
        run: python -u traffic-logger/src/log_traffic.py

      - name: Commit updated traffic data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit when there is actually something new to record
          if git diff --cached --quiet; then
            echo "No new traffic data to commit."
          else
            git commit -m "chore: update traffic data [skip ci]"
            git push
          fi
